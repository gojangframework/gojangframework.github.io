name: Deploy Docusaurus site

on:
  push:
    branches: [ 'main' ]
  schedule:
    - cron: '23 5 * * *'
  workflow_dispatch: {}

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
      
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install dependencies
        run: npm ci

      - name: Create Gojang metrics app token
        id: metrics-token
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ vars.GOJANG_METRICS_APP_CLIENT_ID }}
          private-key: ${{ secrets.GOJANG_METRICS_APP_PRIVATE_KEY }}
          owner: gojangframework
          repositories: gojang
          permission-administration: read

      - name: Collect repository metrics
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        run: npm run metrics:collect
        env:
          GH_METRICS_TOKEN: ${{ steps.metrics-token.outputs.token }}

      - name: Validate repository metrics
        run: npm run metrics:validate

      - name: Commit repository metrics
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        run: |
          if git diff --quiet -- src/data/gojangRepoMetrics.json; then
            echo "No metrics changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/data/gojangRepoMetrics.json
          git commit -m "Update Gojang repo metrics [skip ci]"
          git push origin HEAD:${{ github.ref_name }}
      
      - name: Build site
        run: npm run build
      
      - name: Upload artifact for GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./build

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
